<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموسوعة الشاملة لحساب التكامل | د. صلاح الدين عباس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap');
        body { font-family: 'Changa', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === محرك المعادلات الرياضية (لا تقم بتعديله أبداً) ===
        const MathText = ({ text, className }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                let isCancelled = false;
                const renderMath = () => {
                    if (isCancelled) return;
                    if (containerRef.current && window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetClear([containerRef.current]);
                        window.MathJax.typesetPromise([containerRef.current]).catch(err => console.error(err));
                    } else { setTimeout(renderMath, 100); }
                };
                renderMath();
                return () => { isCancelled = true; };
            }, [text]);
            return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: text }} />;
        };

        // ==========================================================
        // 📚 قسم الشرح والنظريات (BOOK_CHAPTERS)
        // ==========================================================
        let BOOK_CHAPTERS = [
            // --- الجزء 1: الباب الأول ---
            {
                id: 'ch1',
                title: 'مقدمة: الجدول القياسي للتفاضلات',
                page: 'ص 3',
                content: 'يبدأ الكتاب بتأسيس قوي في التفاضل، لأن التكامل هو العملية العكسية للتفاضل. إذا كانت f(x) مشتقة للدالة F(x)، فإن تكامل f(x) يعطينا F(x) + c.',
                rules: [
                    'الدالة الجبرية: $$ y = x^n \\implies \\frac{dy}{dx} = n x^{n-1} $$',
                    'الدالة الأسية (أساس a): $$ y = a^x \\implies \\frac{dy}{dx} = a^x \\ln(a) $$',
                    'الدالة الأسية الطبيعية: $$ y = e^x \\implies \\frac{dy}{dx} = e^x $$',
                    'الدالة اللوغاريتمية: $$ y = \\ln(x) \\implies \\frac{dy}{dx} = \\frac{1}{x} $$'
                ]
            }
            // 🔻 سنقوم بلصق الأبواب القادمة هنا (فوق القوس المربع الذي يغلق المصفوفة) 🔻
        ];

        // ==========================================================
        // ✍️ قسم بنك التمارين (EXERCISES_BANK)
        // ==========================================================
        let EXERCISES_BANK = [
            // --- الجزء 1: تمارين الأساسيات ---
            { 
                id: 'ex1', 
                chapter: 'أساسيات التكامل', 
                page: 'ص 21',
                problem: '$$ \\int x(x^2 + 1) dx $$', 
                hint: 'قم بفك الأقواس بضرب x فيما بداخل القوس لتصبح الدالة عبارة عن مجموع حدين، ثم كامل كل حد باستخدام قاعدة القوة.', 
                answer: '$$ \\int (x^3 + x) dx = \\frac{x^4}{4} + \\frac{x^2}{2} + c $$' 
            }
            // 🔻 سنقوم بلصق التمارين القادمة هنا (فوق القوس المربع الذي يغلق المصفوفة) 🔻
        ];

        // ==========================================================
        // ⚙️ المحرك الأساسي للموقع وتصميم الواجهة (لا تعدل هذا الجزء)
        // ==========================================================
        function App() {
            const [activeTab, setActiveTab] = useState('chapters');
            
            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-900/90 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50 p-4 md:p-6 shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-right">
                                <h1 className="text-2xl md:text-3xl font-bold text-white mb-1 tracking-wide">
                                    حسبان (2) <span className="text-blue-500">|</span> حساب التكامل
                                </h1>
                                <p className="text-emerald-400 text-sm md:text-base">الإصدار الشامل - إعداد د. صلاح الدين عباس</p>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 scrollbar-hide">
                                <button onClick={() => setActiveTab('chapters')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold transition whitespace-nowrap ${activeTab === 'chapters' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800 text-gray-400 hover:bg-slate-700'}`}>📖 الشرح والنظريات</button>
                                <button onClick={() => setActiveTab('exercises')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold transition whitespace-nowrap ${activeTab === 'exercises' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-800 text-gray-400 hover:bg-slate-700'}`}>✍️ بنك التمارين</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 mt-6">
                        {activeTab === 'chapters' && (
                            <div className="space-y-6 animate-fade-in">
                                {BOOK_CHAPTERS.map(ch => (
                                    <div key={ch.id} className="glass-card p-6 md:p-8 rounded-2xl shadow-xl hover:border-blue-500/50 transition-colors">
                                        <div className="flex justify-between items-start mb-4 border-b border-slate-700 pb-4">
                                            <h3 className="text-2xl font-bold text-blue-400">{ch.title}</h3>
                                            <span className="bg-slate-800 border border-slate-600 text-xs px-3 py-1 rounded-full text-slate-300 font-bold">{ch.page}</span>
                                        </div>
                                        <p className="text-gray-300 mb-6 text-lg leading-relaxed">{ch.content}</p>
                                        <div className="bg-slate-900/80 p-6 rounded-xl space-y-4 border border-slate-800">
                                            {ch.rules.map((rule, idx) => (
                                                <MathText key={idx} text={rule} className="block text-xl md:text-2xl text-center text-white bg-black/40 py-3 rounded-lg" />
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'exercises' && (
                            <div className="space-y-6 animate-fade-in">
                                {EXERCISES_BANK.map(ex => (
                                    <div key={ex.id} className="glass-card p-6 rounded-2xl flex flex-col md:flex-row items-center gap-6 shadow-xl border-t-4 border-t-emerald-500">
                                        <div className="md:w-1/2 text-center w-full">
                                            <span className="text-xs bg-emerald-900/50 text-emerald-300 px-3 py-1 rounded-full mb-3 inline-block border border-emerald-700/50">{ex.chapter} - {ex.page}</span>
                                            <MathText text={ex.problem} className="block text-3xl md:text-4xl text-white my-6" />
                                        </div>
                                        <div className="md:w-1/2 w-full space-y-4 border-t md:border-t-0 md:border-r border-slate-700 pt-4 md:pt-0 md:pr-6">
                                            <details className="group bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
                                                <summary className="cursor-pointer p-4 text-yellow-400 font-bold hover:bg-slate-700 transition flex items-center justify-between">
                                                    <span>💡 عرض التلميح وخطوات التفكير</span>
                                                    <span className="text-slate-500 text-sm">▼</span>
                                                </summary>
                                                <div className="p-4 pt-0 text-slate-300 bg-slate-800/50 leading-relaxed border-t border-slate-700 mt-2">{ex.hint}</div>
                                            </details>
                                            <details className="group bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
                                                <summary className="cursor-pointer p-4 text-emerald-400 font-bold hover:bg-slate-700 transition flex items-center justify-between">
                                                    <span>✅ عرض الحل النهائي (النموذجي)</span>
                                                    <span className="text-slate-500 text-sm">▼</span>
                                                </summary>
                                                <div className="p-6 pt-4 text-center bg-slate-900 border-t border-slate-700 mt-2">
                                                    <MathText text={ex.answer} className="text-2xl text-emerald-300" />
                                                </div>
                                            </details>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
